<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolas rebotando</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    background: radial-gradient(circle at 50% 25%, #1a1a2e, #0b0b14 70%);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    color: #e8e8f0;
    padding: 24px;
  }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: .3px; opacity: .9; }
  .layout {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stage { box-shadow: 0 20px 60px rgba(0,0,0,.5); border-radius: 50%; }
  canvas { display: block; border-radius: 50%; }

  .panel {
    width: 230px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px;
    padding: 18px;
  }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .5px;
    opacity: .6;
    display: flex;
    justify-content: space-between;
  }
  .field label b { color: #fff; opacity: 1; font-variant-numeric: tabular-nums; }
  input[type="range"] { width: 100%; accent-color: #7c6cff; }
  input[type="number"], select {
    font: inherit;
    font-size: 14px;
    padding: 8px 10px;
    background: rgba(0,0,0,.3);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 8px;
    color: #e8e8f0;
  }
  .buttons { display: flex; gap: 10px; }
  button {
    flex: 1;
    font: inherit;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 10px;
    background: rgba(255,255,255,.06);
    color: #e8e8f0;
    cursor: pointer;
    transition: background .15s, transform .05s;
  }
  button:hover { background: rgba(255,255,255,.14); }
  button:active { transform: scale(.96); }
  #toggle { background: #7c6cff; border-color: #7c6cff; }
  #toggle:hover { background: #8b7cff; }
  .count {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    opacity: .7;
    text-align: center;
  }
  .count b { color: #fff; opacity: 1; }
  .check {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 13px;
    opacity: .85;
    cursor: pointer;
  }
  .check input { width: 16px; height: 16px; accent-color: #7c6cff; cursor: pointer; }
  .warn {
    min-height: 16px;
    font-size: 12px;
    line-height: 1.35;
    text-align: center;
    color: #ffcf6b;
    font-weight: 600;
  }
  .ptitle { font-size: 15px; font-weight: 700; }
  .hint { font-size: 12px; line-height: 1.4; opacity: .6; }
  button.wide { flex: none; width: 100%; }
  #bench.running { background: #e0556b; border-color: #e0556b; }
  .bench-live {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    background: rgba(0,0,0,.25);
    border-radius: 10px;
    padding: 12px;
  }
  .bench-live b { color: #fff; }
  .results {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .results th, .results td {
    padding: 5px 4px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .results th { opacity: .55; font-weight: 600; text-transform: uppercase; font-size: 10px; }
  .results td b { color: #ff9db0; }
</style>
</head>
<body>
  <h1>Bolas rebotando</h1>
  <div class="layout">
    <div class="stage">
      <canvas id="c" width="560" height="560"></canvas>
    </div>

    <div class="panel">
      <div class="field">
        <label>Velocidad <b id="speedVal">1.0×</b></label>
        <input type="range" id="speed" min="0" max="3" step="0.1" value="1">
      </div>

      <div class="field">
        <label>Tamaño de bola <b id="sizeVal">12 px</b></label>
        <input type="range" id="size" min="4" max="30" step="1" value="12">
      </div>

      <div class="field">
        <label>Límite de bolas <b>(0 = sin tope)</b></label>
        <input type="number" id="limit" min="0" value="0">
      </div>

      <div class="field">
        <label>Dónde aparece la nueva</label>
        <select id="spawnMode">
          <option value="contact">Punto de choque</option>
          <option value="center">Centro</option>
          <option value="random">Posición aleatoria</option>
        </select>
      </div>

      <label class="check">
        <input type="checkbox" id="autoThrottle" checked>
        Freno automático (anti-cuelgue)
      </label>

      <div class="buttons">
        <button id="toggle">Pausar</button>
        <button id="reset">Reiniciar</button>
      </div>

      <div class="count">Bolas: <b id="n">2</b> / <b id="limitLabel">∞</b> · <b id="fps">–</b> FPS</div>
      <div class="warn" id="warn"></div>
    </div>

    <div class="panel bench-panel">
      <div class="ptitle">🧪 Experimento</div>
      <p class="hint">Agrega bolas a ritmo constante y anota cuántas hay al cruzar cada umbral de FPS. Fijá tamaño/velocidad, corré, y compará filas.</p>

      <div class="field">
        <label>Ritmo de alta <b id="rateVal">40/s</b></label>
        <input type="range" id="rate" min="5" max="1000" step="5" value="40">
      </div>

      <button id="bench" class="wide">▶ Iniciar experimento</button>

      <div class="bench-live">
        <div>Estado: <b id="benchState">en espera</b></div>
        <div>Bolas ahora: <b id="benchNow">0</b></div>
        <div>↓ 55 FPS: <b id="m55">–</b></div>
        <div>↓ 30 FPS: <b id="m30">–</b></div>
        <div>↓ 15 FPS: <b id="m15">–</b></div>
        <div>Límite (&lt;8): <b id="mcrash">–</b></div>
      </div>

      <table class="results" id="results">
        <thead><tr><th>Tam</th><th>Vel</th><th>55</th><th>30</th><th>15</th><th>Límite</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H / 2;
const ARENA_R = W / 2 - 6;      // radio del círculo contenedor
const BASE_SPEED = 3.2;         // velocidad base de las bolas
const SPAWN_IMMUNITY = 12;      // frames que la bola nueva no puede chocar

// Config editable por el usuario
let cfg = {
  speedMult: 1,
  ballRadius: 12,
  limit: Infinity,     // sin tope
  spawnMode: 'contact',
};

let balls = [];
let running = true;
let throttled = false;       // true = FPS bajo, se pausa la creación de bolas
let autoThrottle = true;     // vigilancia de rendimiento activada
const FPS_FLOOR = 30;        // por debajo de esto, frenar creación
const FPS_RESUME = 45;       // histéresis: recién arriba de esto se reanuda

// --- Experimento / benchmark ---
let benchmark = false;
let benchRate = 40;          // bolas por segundo agregadas durante el experimento
let benchAdd = 0;            // acumulador fraccionario de altas
let benchMarks = { 55: null, 30: null, 15: null };
let benchLowFrames = 0;      // frames seguidos con FPS < 8
let benchStart = null;       // {size, speed} capturados al iniciar
const BENCH_SAFETY = 60000;  // tope duro de seguridad (memoria)

function randColor() {
  return `hsl(${Math.floor(Math.random() * 360)}, 85%, 60%)`;
}

function makeBall(x, y, immune = 0) {
  const a = Math.random() * Math.PI * 2;
  return {
    x, y,
    vx: Math.cos(a) * BASE_SPEED,
    vy: Math.sin(a) * BASE_SPEED,
    color: randColor(),
    flash: 0,
    cooldown: immune,   // no colisiona mientras cooldown > 0
  };
}

// Punto dentro de la arena para el modo "aleatorio"
function randomInside() {
  const r = (ARENA_R - cfg.ballRadius) * Math.sqrt(Math.random());
  const t = Math.random() * Math.PI * 2;
  return { x: CX + Math.cos(t) * r, y: CY + Math.sin(t) * r };
}

function reset() {
  balls = [
    makeBall(CX - 70, CY),
    makeBall(CX + 70, CY),
  ];
  updateCount();
}

function updateCount() {
  document.getElementById('n').textContent = balls.length;
}

// Rebote contra la pared circular
function wallBounce(b) {
  const dx = b.x - CX, dy = b.y - CY;
  const dist = Math.hypot(dx, dy);
  const limit = ARENA_R - cfg.ballRadius;
  if (dist > limit) {
    const nx = dx / dist, ny = dy / dist;
    b.x = CX + nx * limit;
    b.y = CY + ny * limit;
    const dot = b.vx * nx + b.vy * ny;
    b.vx -= 2 * dot * nx;
    b.vy -= 2 * dot * ny;
    b.flash = 1;
  }
}

// Colisiones entre bolas usando una GRILLA ESPACIAL (spatial hashing).
// Cada bola solo se compara con las de su celda y las 8 vecinas -> ~O(n) en vez de O(n²).
const grid = new Map();
function ballCollisions() {
  const spawned = [];
  const minDist = cfg.ballRadius * 2;
  const cs = minDist;                        // tamaño de celda = distancia de colisión
  const canSpawn = !throttled && !benchmark; // freno o experimento cortan el spawn por choque

  // 1) indexar bolas en celdas
  grid.clear();
  for (let i = 0; i < balls.length; i++) {
    const b = balls[i];
    // +512 evita claves negativas; las posiciones viven dentro de la arena
    const key = (((b.x / cs) | 0) + 512) * 100000 + (((b.y / cs) | 0) + 512);
    let arr = grid.get(key);
    if (arr) arr.push(i);
    else grid.set(key, [i]);
  }

  // 2) chequear solo pares en celda propia + vecinas
  for (let i = 0; i < balls.length; i++) {
    const a = balls[i];
    const cx = (a.x / cs) | 0, cy = (a.y / cs) | 0;
    for (let ox = -1; ox <= 1; ox++) {
      for (let oy = -1; oy <= 1; oy++) {
        const arr = grid.get(((cx + ox) + 512) * 100000 + ((cy + oy) + 512));
        if (!arr) continue;
        for (let n = 0; n < arr.length; n++) {
          const j = arr[n];
          if (j <= i) continue;              // cada par una sola vez
          const b = balls[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const dist = Math.hypot(dx, dy);
          if (dist === 0 || dist >= minDist) continue;

          const nx = dx / dist, ny = dy / dist;
          const relVel = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;

          // separar siempre (para que no queden solapadas)
          const overlap = (minDist - dist) / 2;
          a.x -= nx * overlap; a.y -= ny * overlap;
          b.x += nx * overlap; b.y += ny * overlap;

          // solo es choque real si se acercan
          if (relVel >= 0) continue;

          // choque elástico (masas iguales): intercambio en el eje normal
          a.vx += relVel * nx; a.vy += relVel * ny;
          b.vx -= relVel * nx; b.vy -= relVel * ny;
          a.flash = 1; b.flash = 1;

          if (a.cooldown > 0 || b.cooldown > 0) continue;
          if (canSpawn && balls.length + spawned.length < cfg.limit) {
            let pos;
            if (cfg.spawnMode === 'center') pos = { x: CX, y: CY };
            else if (cfg.spawnMode === 'random') pos = randomInside();
            else pos = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
            spawned.push(makeBall(pos.x, pos.y, SPAWN_IMMUNITY));
          }
        }
      }
    }
  }
  if (spawned.length) {
    balls.push(...spawned);
    updateCount();
  }
}

function step() {
  const m = cfg.speedMult;
  for (const b of balls) {
    b.x += b.vx * m;
    b.y += b.vy * m;
    wallBounce(b);
    if (b.flash > 0) b.flash -= 0.06;
    if (b.cooldown > 0) b.cooldown--;
  }
  ballCollisions();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const R = cfg.ballRadius;

  ctx.beginPath();
  ctx.arc(CX, CY, ARENA_R, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,.03)';
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(255,255,255,.25)';
  ctx.stroke();

  for (const b of balls) {
    if (b.flash > 0) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, R + 6 * b.flash, 0, Math.PI * 2);
      ctx.fillStyle = b.color;
      ctx.globalAlpha = 0.25 * b.flash;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.beginPath();
    ctx.arc(b.x, b.y, R, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.fill();
  }
}

/* ---------- Experimento ---------- */
function startBench() {
  balls = [ makeBall(CX - 70, CY), makeBall(CX + 70, CY) ];
  updateCount();
  benchmark = true;
  running = true;
  // apagar el freno para que empuje hasta el límite real
  autoThrottle = false; throttled = false;
  document.getElementById('autoThrottle').checked = false;
  benchAdd = 0; benchLowFrames = 0;
  benchMarks = { 55: null, 30: null, 15: null };
  benchStart = { size: cfg.ballRadius, speed: cfg.speedMult };
  fpsSmooth = 60;
  ['m55','m30','m15','mcrash'].forEach(id => document.getElementById(id).textContent = '–');
  document.getElementById('benchState').textContent = 'corriendo…';
  const btn = document.getElementById('bench');
  btn.textContent = '■ Detener'; btn.classList.add('running');
}

function stopBench(reason) {
  benchmark = false;
  const btn = document.getElementById('bench');
  btn.textContent = '▶ Iniciar experimento'; btn.classList.remove('running');
  document.getElementById('benchState').textContent = reason;
}

function addResultRow(start, marks, limit) {
  const tb = document.querySelector('#results tbody');
  const tr = document.createElement('tr');
  const cell = v => (v == null ? '–' : v);
  tr.innerHTML =
    `<td>${start.size}px</td><td>${start.speed.toFixed(1)}×</td>` +
    `<td>${cell(marks[55])}</td><td>${cell(marks[30])}</td>` +
    `<td>${cell(marks[15])}</td><td><b>${limit}</b></td>`;
  tb.prepend(tr);
}

// Corre cada frame mientras el experimento está activo
function benchTick(dt) {
  // 1) altas a ritmo constante (independiente del FPS, usa tiempo real)
  benchAdd += (dt / 1000) * benchRate;
  while (benchAdd >= 1 && balls.length < BENCH_SAFETY) {
    const p = randomInside();
    balls.push(makeBall(p.x, p.y, 0));
    benchAdd -= 1;
  }
  updateCount();

  const bn = balls.length;
  document.getElementById('benchNow').textContent = bn;

  // 2) anotar cuántas bolas hay al cruzar cada umbral (una sola vez c/u)
  for (const t of [55, 30, 15]) {
    if (benchMarks[t] === null && fpsSmooth < t) {
      benchMarks[t] = bn;
      document.getElementById('m' + t).textContent = bn;
    }
  }

  // 3) límite práctico: FPS < 8 sostenido ~medio segundo
  if (fpsSmooth < 8) {
    benchLowFrames++;
    if (benchLowFrames >= 20) {
      document.getElementById('mcrash').textContent = bn;
      addResultRow(benchStart, benchMarks, bn);
      stopBench('límite alcanzado ✓');
    }
  } else {
    benchLowFrames = 0;
  }

  // 4) tope de seguridad por memoria
  if (balls.length >= BENCH_SAFETY) {
    document.getElementById('mcrash').textContent = '>' + BENCH_SAFETY;
    addResultRow(benchStart, benchMarks, '>' + BENCH_SAFETY);
    stopBench('tope de seguridad');
  }
}

let lastTime = performance.now();
let fpsSmooth = 60;
let fpsAccum = 0;

function loop(now) {
  const dt = now - lastTime;
  lastTime = now;
  if (dt > 0) {
    // media exponencial para que el número no titile
    fpsSmooth += (1000 / dt - fpsSmooth) * 0.1;
  }
  // freno automático: histéresis sobre el FPS suavizado
  if (autoThrottle && running) {
    if (!throttled && fpsSmooth < FPS_FLOOR) throttled = true;
    else if (throttled && fpsSmooth > FPS_RESUME) throttled = false;
  } else if (!autoThrottle) {
    throttled = false;
  }

  fpsAccum += dt;
  if (fpsAccum >= 250) {          // actualizar el texto 4 veces por segundo
    $('fps').textContent = Math.round(fpsSmooth);
    $('warn').textContent = throttled
      ? '⏸ Freno activo — creación en pausa por bajo FPS'
      : '';
    fpsAccum = 0;
  }

  if (benchmark && running) benchTick(dt);

  if (running) step();
  draw();
  requestAnimationFrame(loop);
}

/* ---------- Controles ---------- */
const $ = id => document.getElementById(id);

$('speed').addEventListener('input', e => {
  cfg.speedMult = parseFloat(e.target.value);
  $('speedVal').textContent = cfg.speedMult.toFixed(1) + '×';
});
$('size').addEventListener('input', e => {
  cfg.ballRadius = parseInt(e.target.value, 10);
  $('sizeVal').textContent = cfg.ballRadius + ' px';
});
$('limit').addEventListener('change', e => {
  let v = parseInt(e.target.value, 10);
  if (isNaN(v) || v <= 0) {          // 0 o vacío = sin tope
    cfg.limit = Infinity;
    e.target.value = 0;
    $('limitLabel').textContent = '∞';
  } else {
    cfg.limit = v;
    e.target.value = v;
    $('limitLabel').textContent = v;
  }
});
$('spawnMode').addEventListener('change', e => { cfg.spawnMode = e.target.value; });
$('autoThrottle').addEventListener('change', e => { autoThrottle = e.target.checked; });
$('rate').addEventListener('input', e => {
  benchRate = parseInt(e.target.value, 10);
  $('rateVal').textContent = benchRate + '/s';
});
$('bench').addEventListener('click', () => {
  if (benchmark) stopBench('detenido');
  else startBench();
});

const toggleBtn = $('toggle');
toggleBtn.addEventListener('click', () => {
  running = !running;
  toggleBtn.textContent = running ? 'Pausar' : 'Reanudar';
});
$('reset').addEventListener('click', () => {
  if (benchmark) stopBench('en espera');
  reset();
  running = true;
  toggleBtn.textContent = 'Pausar';
});

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
